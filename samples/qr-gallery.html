<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sample Event QR Cards</title>
    <style>
      :root {
        --bg: #f4efe6;
        --card: #fffdf8;
        --ink: #1b1f18;
        --muted: #5f675d;
        --line: #d9d0c2;
        --accent: #1f6f5d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(31, 111, 93, 0.1), transparent 28%),
          linear-gradient(180deg, #f8f3ea 0%, var(--bg) 100%);
        color: var(--ink);
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }

      .header {
        margin-bottom: 28px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 0.95;
      }

      .sub {
        margin: 0;
        max-width: 720px;
        font-size: 16px;
        line-height: 1.5;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
        margin-top: 28px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(39, 34, 24, 0.08);
      }

      .role {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(31, 111, 93, 0.1);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .name {
        margin: 14px 0 4px;
        font-size: 26px;
        line-height: 1;
      }

      .event {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .qr-wrap {
        background: white;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px;
        min-height: 256px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qr {
        width: 220px;
        height: 220px;
      }

      .payload {
        margin-top: 14px;
        font-family: "Courier New", monospace;
        font-size: 11px;
        line-height: 1.45;
        word-break: break-all;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <p class="eyebrow">Sample Event 2026</p>
        <h1>QR Badge Gallery</h1>
        <p class="sub">
          Local sample attendee cards generated from the current development database. Each card shows the attendee name,
          role, and scanner-ready QR payload.
        </p>
      </header>

      <section class="grid" id="grid"></section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      const attendees = [
        {
          name: "Alice Johnson",
          role: "Speaker",
          payload: "evtqr_v1.UoNeALkGGgYXH7k7egLrSGRIRegSrsLEGYHflRQqVUI",
        },
        {
          name: "Bob Smith",
          role: "Guest",
          payload: "evtqr_v1.hWB9VQAPOsBnLmn_vObp5Sn_Wm_GTjXuuKGtfnOf-20",
        },
        {
          name: "Carla Mendes",
          role: "Organizer",
          payload: "evtqr_v1.jQ-02DRxrrEkxsV-PHGvMGd-dktpVPeQr0x6qK9fyp4",
        },
        {
          name: "David Lee",
          role: "Attendee",
          payload: "evtqr_v1.W8aBw3-gVwLeZZBm35zD_tbABh6ftWtfvdUr9KuupZA",
        },
        {
          name: "Emma Brown",
          role: "Media",
          payload: "evtqr_v1.X2vD94pb6FXaaALvzBt8sx2uyev9DoJI3Z_1oEgvmQI",
        },
      ];

      const grid = document.getElementById("grid");

      attendees.forEach((attendee, index) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <span class="role">${attendee.role}</span>
          <h2 class="name">${attendee.name}</h2>
          <p class="event">Sample Event 2026</p>
          <div class="qr-wrap"><div class="qr" id="qr-${index}"></div></div>
          <div class="payload">${attendee.payload}</div>
        `;
        grid.appendChild(card);

        new QRCode(document.getElementById(`qr-${index}`), {
          text: attendee.payload,
          width: 220,
          height: 220,
          correctLevel: QRCode.CorrectLevel.M,
        });
      });
    </script>
  </body>
</html>
